{% extends 'base.html' %}

{% block content %}
<div class="container mx-auto p-6 max-w-4xl">
    <h1 class="text-3xl font-bold mb-8 text-gray-800 text-center">Frequently Asked Questions</h1>

    <div class="space-y-6">
        {% for faq in faqs %}
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition">
            <h3 class="text-lg font-semibold text-indigo-700 mb-3">
                {{ faq.question }}
            </h3>
            <p class="text-gray-600 leading-relaxed whitespace-pre-line">
                {{ faq.answer }}
            </p>
        </div>
        {% empty %}
        <div class="text-center py-12 bg-white rounded-xl shadow-sm border border-gray-100 text-gray-500">
            No FAQs available at the moment. Check back later!
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
