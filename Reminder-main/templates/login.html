{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AEQUS Reminder System</title>

    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

    
   <script src="{% static 'JS/tailwind.js' %}"></script>

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
        }

       
        .card-enter {
            animation: cardEnter 0.6s ease-out;
        }

        @keyframes cardEnter {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
    </style>
</head>

<body class="h-screen flex items-center justify-center bg-cover bg-center"
      style="background-image: url('{% static 'images/bg.jpg' %}')">

    
    <div class="card-enter w-full max-w-md p-8 rounded-2xl
                backdrop-blur-xl bg-white/85 shadow-2xl border border-white/40">

        
        <div class="flex flex-col items-center mb-6">
            <img src="{% static 'images/logo.jpg' %}"
                 alt="AEQUS"
                 class="w-40 mb-3">
        </div>
        {% if error %}
        <div class="flex items-center gap-2 mb-4 px-3 py-2 rounded-lg
                    bg-red-50 border border-red-200 text-red-600 text-sm">
            <span>⚠</span>
            <span>{{ error }}</span>
        </div>
        {% endif %}

      
        <form method="POST" class="space-y-4">
            {% csrf_token %}

            
            <input type="text" name="username" required
                   placeholder="Username"
                   class="w-full px-4 py-2.5 rounded-lg border border-gray-300
                          focus:outline-none focus:ring-2 focus:ring-blue-500
                          focus:border-blue-500 transition">

            <input type="password" name="password" required
                   placeholder="Password"
                   class="w-full px-4 py-2.5 rounded-lg border border-gray-300
                          focus:outline-none focus:ring-2 focus:ring-blue-500
                          focus:border-blue-500 transition">

            
            <button type="submit"
                    class="w-full py-2.5 rounded-lg text-white font-semibold
                           bg-gradient-to-r from-red-600 to-red-500
                           hover:from-red-700 hover:to-red-600
                           active:scale-[0.98]
                           focus:outline-none focus:ring-2 focus:ring-red-400
                           transition duration-200 shadow-md">
                Login
            </button>
        </form>

        
        <p class="text-center text-[11px] text-gray-400 mt-6">
            © 2026 AEQUS
        </p>
    </div>

</body>
</html>
